<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer Komen TikTok - Ketikan Manusia Asli</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b132b;
            color: #f0f5fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background-color: #1c2541;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            color: #48cae4;
            font-size: 22px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 13px;
            color: #ae9cff;
            margin-bottom: 20px;
            font-style: italic;
        }

        .text-box {
            background-color: #3a506b;
            border-radius: 10px;
            padding: 20px;
            min-height: 180px;
            text-align: left;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-line;
            margin-bottom: 25px;
            border: 1px solid #5bc0be;
            overflow-y: auto;
            color: #ffffff;
            font-weight: 500;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-salin {
            background-color: #ff4757;
        }

        .btn-salin:hover {
            background-color: #ee5253;
        }

        .btn-generate {
            background-color: #2e86de;
        }

        .btn-generate:hover {
            background-color: #54a0ff;
        }

        .btn-control {
            width: 100%;
            background-color: #10ac84;
            margin-bottom: 25px;
        }

        .btn-control:hover {
            background-color: #1dd1a1;
        }

        .btn-control.paused {
            background-color: #feca57;
            color: #222;
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
        }

        .timer-container input {
            width: 65px;
            padding: 8px;
            border: 1px solid #5bc0be;
            background-color: #ffffff;
            color: #1c2541;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-apply {
            background-color: #00b4d8;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-apply:hover {
            background-color: #0096c7;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #10ac84;
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TikTok Smart Randomizer</h1>
        <div class="subtitle">Ketikan Real Manusia (50 Variasi Gaul & No Kaku)</div>
        
        <div class="text-box" id="textBox">Memuat teks...</div>

        <div class="btn-container">
            <button class="btn btn-salin" id="btnSalin">📋 Salin Teks</button>
            <button class="btn btn-generate" id="btnGenerate">🔄 Acak Teks</button>
        </div>

        <button class="btn btn-control" id="btnControl">⏸️ Start / Pause</button>

        <div class="timer-container">
            <span>Timer :</span>
            <input type="number" id="timerInput" value="3" min="1">
            <span>detik</span>
            <button class="btn-apply" id="btnApply">Apply</button>
        </div>
    </div>

    <div class="toast" id="toast">Teks Berhasil Disalin!</div>

    <script>
        const linkUtama = "https://chat.whatsapp.com/E9wCodL7tWK47qMfvbDH51?mode=hqrc";
        const linkML = "https://whatsapp.com/channel/0029VbB5xTP3GJOzlxzCl20S";
        const linkFF = "https://whatsapp.com/channel/0029Vb6TFJAFy72Jy6JIpv0m";

        // Hook super gaul & to the point menangani masalah customer
        const hooks = [
            "lu mau jual akun tp susah laku atau takut kena riper fb?",
            "butuh akun game spek dewa tp dana mepet pas-pasan?",
            "daripada akun ml/ff lu nganggur, mending cairin jd duit cash disini",
            "hari gini masi kena scam pas jb akun? merapat ke grup rekber aman gua",
            "mau pensi lepas akun pribadi tp ditawar murah bgt ama tengkulak?",
            "nyari lapak jb akun game yg adminnya fast respon n amanah?",
            "akun lu bnyk skin limited tp bingung mau dilepas kmana biar cpt?",
            "plis jgn asal transaksi direct kl gamau duit lu ilang digondol riper",
            "lu nyari akun tumbal buat pushrank ato emang akun utama spek sultan?",
            "cape bgt liat bocil kena tipu mulu pas beli akun game, masuk sini"
        ];

        // Solusi ala tongkrongan anak game
        const solutions = [
            "grup gua isinya real buyer sultan modal gede, siap nampung akun lu.",
            "masuk sini aja, bnyk list akun ready murah bgt dr pd marketplace.",
            "transaksi via admin resmi dijamin aman 100% anti riper anti hb.",
            "langsung join grup utama gua biar gampang mantau pasaran lapak jb.",
            "cek aja tstinya tiap hari kl ragu, no drama rill amanah."
        ];

        // CTA Singkat pake singkatan chat biasa
        const ctas = [
            "grup utama:\n👉 " + linkUtama + "\n\nlink lapak akun:\n🛒 ml: " + linkML + "\n🛒 ff: " + linkFF,
            "grup sultan:\n🔗 " + linkUtama + "\n\nupdate stock:\n📌 lapak ml: " + linkML + "\n📌 lapak ff: " + linkFF,
            "gas join disini:\n📥 " + linkUtama + "\n\nready stock:\n⚡ ml: " + linkML + "\n⚡ ff: " + linkFF
        ];

        // Gabungin otomatis jadi 50 variasi randomizer
        const textVariations = [];
        let count = 0;
        for (let h = 0; h < hooks.length; h++) {
            for (let s = 0; s < solutions.length; s++) {
                let cta = ctas[count % ctas.length];
                textVariations.push(hooks[h] + ". " + solutions[s] + "\n\n" + cta);
                count++;
            }
        }

        let currentIndex = 0;
        let isRunning = true;
        let timerDuration = 3000;
        let intervalId = null;

        const textBox = document.getElementById('textBox');
        const btnSalin = document.getElementById('btnSalin');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnControl = document.getElementById('btnControl');
        const timerInput = document.getElementById('timerInput');
        const btnApply = document.getElementById('btnApply');
        const toast = document.getElementById('toast');

        function updateText() {
            let newIndex = Math.floor(Math.random() * textVariations.length);
            while (newIndex === currentIndex && textVariations.length > 1) {
                newIndex = Math.floor(Math.random() * textVariations.length);
            }
            currentIndex = newIndex;
            textBox.textContent = textVariations[currentIndex];
        }

        function startInterval() {
            clearInterval(intervalId);
            if (isRunning) {
                intervalId = setInterval(() => {
                    updateText();
                }, timerDuration);
            }
        }

        updateText();
        startInterval();

        btnGenerate.addEventListener('click', () => {
            updateText();
        });

        btnSalin.addEventListener('click', () => {
            navigator.clipboard.writeText(textBox.textContent).then(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 1500);
            }).catch(err => {
                alert('Gagal menyalin teks.');
            });
        });

        btnControl.addEventListener('click', () => {
            isRunning = !isRunning;
            if (isRunning) {
                btnControl.textContent = "⏸️ Start / Pause";
                btnControl.classList.remove('paused');
                startInterval();
            } else {
                btnControl.textContent = "▶️ Resume / Mulai";
                btnControl.classList.add('paused');
                clearInterval(intervalId);
            }
        });

        btnApply.addEventListener('click', () => {
            const sec = parseInt(timerInput.value);
            if (sec && sec >= 1) {
                timerDuration = sec * 1000;
                if (isRunning) {
                    startInterval();
                }
                alert("Interval diubah: " + sec + " detik!");
            } else {
                alert('Minimal 1 detik!');
            }
        });
    </script>
</body>
</html>
