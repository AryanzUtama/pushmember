<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer Komen TikTok - Auto Clicker Friendly</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b132b;
            color: #f0f5fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background-color: #1c2541;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            color: #48cae4;
            font-size: 22px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 13px;
            color: #ae9cff;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Menggunakan textarea agar lebih ramah auto-select & bypass blokir browser */
        .text-area-box {
            width: 100%;
            background-color: #3a506b;
            border-radius: 10px;
            padding: 20px;
            height: 220px;
            text-align: left;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 25px;
            border: 1px solid #5bc0be;
            overflow-y: auto;
            color: #ffffff;
            font-weight: 500;
            resize: none;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-salin {
            background-color: #ff4757;
        }

        .btn-salin:hover {
            background-color: #ee5253;
        }

        .btn-generate {
            background-color: #2e86de;
        }

        .btn-generate:hover {
            background-color: #54a0ff;
        }

        .btn-control {
            width: 100%;
            background-color: #10ac84;
            margin-bottom: 25px;
        }

        .btn-control:hover {
            background-color: #1dd1a1;
        }

        .btn-control.paused {
            background-color: #feca57;
            color: #222;
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
        }

        .timer-container input {
            width: 65px;
            padding: 8px;
            border: 1px solid #5bc0be;
            background-color: #ffffff;
            color: #1c2541;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-apply {
            background-color: #00b4d8;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-apply:hover {
            background-color: #0096c7;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #10ac84;
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TikTok Smart Randomizer</h1>
        <div class="subtitle">Bypass Blokir Auto Clicker (50 Variasi Lapak)</div>
        
        <!-- Mengubah element div menjadi textarea agar auto-copy lancar via bot -->
        <textarea class="text-area-box" id="textBox" readonly>Memuat teks...</textarea>

        <div class="btn-container">
            <button class="btn btn-salin" id="btnSalin">📋 Salin Teks</button>
            <button class="btn btn-generate" id="btnGenerate">🔄 Acak Teks</button>
        </div>

        <button class="btn btn-control" id="btnControl">⏸️ Start / Pause</button>

        <div class="timer-container">
            <span>Timer :</span>
            <input type="number" id="timerInput" value="3" min="1">
            <span>detik</span>
            <button class="btn-apply" id="btnApply">Apply</button>
        </div>
    </div>

    <div class="toast" id="toast">Teks Berhasil Disalin!</div>

    <script>
        const linkUtama = "https://chat.whatsapp.com/E9wCodL7tWK47qMfvbDH51?mode=hqrc";
        const linkML = "https://whatsapp.com/channel/0029VbB5xTP3GJOzlxzCl20S";
        const linkFF = "https://whatsapp.com/channel/0029Vb6TFJAFy72Jy6JIpv0m";

        const titles = [
            "JB AMANAH NOMER SATU",
            "REKBER AMAN NO RIPER",
            "SULTAN LAPAK JB AKUN",
            "TEMPAT JUAL BELI AKUN RESMI",
            "BUYER SULTAN NAMPUNG AKUN",
            "GAK USAH TAKUT DI RIPER",
            "PUSAT JB AKUN GAME HP",
            "WANT TO SELL / BUY AKUN RESMI",
            "REKBER FAST RESPON AMANAH",
            "LAPAK AKUN ANTI HACKBACK"
        ];

        const layouts = [
            {
                grup: "LINK GRUP UTAMA:",
                line1: "__________",
                ff: "LINK LAPAK EPEP RESMI:",
                line2: "__________",
                ml: "LINK LAPAK ML RESMI:"
            },
            {
                grup: "👉 JOIN GRUP SULTAN:",
                line1: "====================",
                ff: "👉 LAPAK JUAL BELI FF:",
                line2: "====================",
                ml: "👉 LAPAK JUAL BELI ML:"
            },
            {
                grup: "🔥 GRUP UTAMA REKBER:",
                line1: "--------------------",
                ff: "🔥 SALURAN AKUN FF:",
                line2: "--------------------",
                ml: "🔥 SALURAN AKUN ML:"
            },
            {
                grup: "👑 LINK GRUP WA:",
                line1: "~~~~~~~~~~~~~~~",
                ff: "👑 LINK LAPAK FF:",
                line2: "~~~~~~~~~~~~~~~",
                ml: "👑 LINK LAPAK ML:"
            },
            {
                grup: "🔗 MASUK GRUP DI SINI:",
                line1: "_____________",
                ff: "📥 LAPAK AKUN FF:",
                line2: "_____________",
                ml: "📥 LAPAK AKUN ML:"
            }
        ];

        const textVariations = [];
        let num = 1;
        
        for (let t = 0; t < titles.length; t++) {
            for (let l = 0; l < layouts.length; l++) {
                let lay = layouts[l];
                let text = "[ " + num + " ] " + titles[t] + "\n" +
                           lay.grup + "\n" + linkUtama + "\n" +
                           lay.line1 + "\n" +
                           lay.ff + "\n" + linkFF + "\n" +
                           lay.line2 + "\n" +
                           lay.ml + "\n" + linkML;
                           
                textVariations.push(text);
                num++;
            }
        }

        let currentIndex = 0;
        let isRunning = true;
        let timerDuration = 3000;
        let intervalId = null;

        const textBox = document.getElementById('textBox');
        const btnSalin = document.getElementById('btnSalin');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnControl = document.getElementById('btnControl');
        const timerInput = document.getElementById('timerInput');
        const btnApply = document.getElementById('btnApply');
        const toast = document.getElementById('toast');

        function updateText() {
            let newIndex = Math.floor(Math.random() * textVariations.length);
            while (newIndex === currentIndex && textVariations.length > 1) {
                newIndex = Math.floor(Math.random() * textVariations.length);
            }
            currentIndex = newIndex;
            textBox.value = textVariations[currentIndex];
        }

        function startInterval() {
            clearInterval(intervalId);
            if (isRunning) {
                intervalId = setInterval(() => {
                    updateText();
                }, timerDuration);
            }
        }

        updateText();
        startInterval();

        btnGenerate.addEventListener('click', () => {
            updateText();
        });

        // REVISI UTAMA: Metode salin lawas + Select text untuk bypass keamanan browser pas diklik bot
        btnSalin.addEventListener('click', () => {
            textBox.select();
            textBox.setSelectionRange(0, 99999); // Untuk HP/Mobile

            try {
                // Menggunakan dokumen execCommand lawas yang tembus klik tiruan/auto clicker
                const sukses = document.execCommand('copy');
                if (sukses) {
                    toast.classList.add('show');
                    setTimeout(() => {
                        toast.classList.remove('show');
                    }, 1500);
                } else {
                    alert('Gagal menyalin otomatis.');
                }
            } catch (err) {
                // Fallback darurat jika execCommand gagal
                navigator.clipboard.writeText(textBox.value);
            }
        });

        btnControl.addEventListener('click', () => {
            isRunning = !isRunning;
            if (isRunning) {
                btnControl.textContent = "⏸️ Start / Pause";
                btnControl.classList.remove('paused');
                startInterval();
            } else {
                btnControl.textContent = "▶️ Resume / Mulai";
                btnControl.classList.add('paused');
                clearInterval(intervalId);
            }
        });

        btnApply.addEventListener('click', () => {
            const sec = parseInt(timerInput.value);
            if (sec && sec >= 1) {
                timerDuration = sec * 1000;
                if (isRunning) {
                    startInterval();
                }
                alert("Interval diubah: " + sec + " detik!");
            } else {
                alert('Minimal 1 detik!');
            }
        });
    </script>
</body>
</html>
