<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer Komen TikTok - Singkat & To The Point</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b132b;
            color: #f0f5fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background-color: #1c2541;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            color: #48cae4;
            font-size: 22px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 13px;
            color: #ae9cff;
            margin-bottom: 20px;
            font-style: italic;
        }

        .text-box {
            background-color: #3a506b;
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            text-align: left;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-line;
            margin-bottom: 25px;
            border: 1px solid #5bc0be;
            overflow-y: auto;
            color: #ffffff;
            font-weight: 500;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-salin {
            background-color: #ff4757;
        }

        .btn-salin:hover {
            background-color: #ee5253;
        }

        .btn-generate {
            background-color: #2e86de;
        }

        .btn-generate:hover {
            background-color: #54a0ff;
        }

        .btn-control {
            width: 100%;
            background-color: #10ac84;
            margin-bottom: 25px;
        }

        .btn-control:hover {
            background-color: #1dd1a1;
        }

        .btn-control.paused {
            background-color: #feca57;
            color: #222;
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
        }

        .timer-container input {
            width: 65px;
            padding: 8px;
            border: 1px solid #5bc0be;
            background-color: #ffffff;
            color: #1c2541;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-apply {
            background-color: #00b4d8;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-apply:hover {
            background-color: #0096c7;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #10ac84;
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TikTok Smart Randomizer</h1>
        <div class="subtitle">Teks Singkat, To The Point, & Anti-Spam</div>
        
        <div class="text-box" id="textBox">Memuat teks...</div>

        <div class="btn-container">
            <button class="btn btn-salin" id="btnSalin">📋 Salin Teks</button>
            <button class="btn btn-generate" id="btnGenerate">🔄 Acak Teks</button>
        </div>

        <button class="btn btn-control" id="btnControl">⏸️ Start / Pause</button>

        <div class="timer-container">
            <span>Timer :</span>
            <input type="number" id="timerInput" value="3" min="1">
            <span>detik</span>
            <button class="btn-apply" id="btnApply">Apply</button>
        </div>
    </div>

    <div class="toast" id="toast">Teks Berhasil Disalin!</div>

    <script>
        const linkUtama = "https://chat.whatsapp.com/E9wCodL7tWK47qMfvbDH51?mode=hqrc";
        const linkML = "https://whatsapp.com/channel/0029VbB5xTP3GJOzlxzCl20S";
        const linkFF = "https://whatsapp.com/channel/0029Vb6TFJAFy72Jy6JIpv0m";

        // Kalimat pendek pembuka masalah customer
        const hooks = [
            "Lu jual akun game susah laku atau takut ditipu rekber gadungan?",
            "Lagi butuh akun game spek GG tapi modal mepet?",
            "Punya akun ML/FF nganggur? Mending jadiin duit cash segar di sini.",
            "Hari gini masih ketipu pas beli akun? Sini masuk grup rekber aman.",
            "Mau lepas akun pribadi tapi ditawar sadis sama tengkulak?",
            "Nyari lapak jual beli akun game yang adminnya fast respon & amanah?",
            "Mau pensiun main game? Sini akun lu biar ditampung sama buyer sultan.",
            "Beli akun di pasaran mahal karena pajak? Direct lewat grup kita aja.",
            "Akun banyak skin limited tapi bingung mau lepas ke mana?",
            "Jangan transaksi direct sembarangan kalau gak mau rugi uang."
        ];

        // Solusi instan
        const solutions = [
            "Grup kita isinya real buyer sultan yang siap nampung akun lu dengan harga waras.",
            "Masuk sini, banyak list akun ready stock spek dewa harga paling murah.",
            "Transaksi aman 100% via admin terpercaya, anti riper & bebas drama.",
            "Sini gabung komunitas jual-beli resmi, amanin transaksi lu sekarang.",
            "Cek testimoni suksesnya tiap hari di grup utama kita."
        ];

        // CTA Singkat & To the point
        const ctas = [
            "Grup Utama:\n👉 " + linkUtama + "\n\nPasar Lapak Akun:\n🛒 ML: " + linkML + "\n🛒 FF: " + linkFF,
            "Link Grup Sultan:\n🔗 " + linkUtama + "\n\nKatalog Jual-Beli:\n📌 Lapak ML: " + linkML + "\n📌 Lapak FF: " + linkFF,
            "Gas Masuk Grup:\n📥 " + linkUtama + "\n\nList Akun Ready:\n⚡ Lapak ML: " + linkML + "\n⚡ Lapak FF: " + linkFF
        ];

        // Generate 50 Variasi Teks Pendek
        const textVariations = [];
        let count = 0;
        for (let h = 0; h < hooks.length; h++) {
            for (let s = 0; s < solutions.length; s++) {
                let cta = ctas[count % ctas.length];
                textVariations.push("🔥 " + hooks[h] + "\n\n" + solutions[s] + "\n\n" + cta);
                count++;
            }
        }

        let currentIndex = 0;
        let isRunning = true;
        let timerDuration = 3000;
        let intervalId = null;

        const textBox = document.getElementById('textBox');
        const btnSalin = document.getElementById('btnSalin');
        const btnGenerate = document.getElementById('btnGenerate');
        const btnControl = document.getElementById('btnControl');
        const timerInput = document.getElementById('timerInput');
        const btnApply = document.getElementById('btnApply');
        const toast = document.getElementById('toast');

        function updateText() {
            let newIndex = Math.floor(Math.random() * textVariations.length);
            while (newIndex === currentIndex && textVariations.length > 1) {
                newIndex = Math.floor(Math.random() * textVariations.length);
            }
            currentIndex = newIndex;
            textBox.textContent = textVariations[currentIndex];
        }

        function startInterval() {
            clearInterval(intervalId);
            if (isRunning) {
                intervalId = setInterval(() => {
                    updateText();
                }, timerDuration);
            }
        }

        updateText();
        startInterval();

        btnGenerate.addEventListener('click', () => {
            updateText();
        });

        btnSalin.addEventListener('click', () => {
            navigator.clipboard.writeText(textBox.textContent).then(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 1500);
            }).catch(err => {
                alert('Gagal menyalin teks.');
            });
        });

        btnControl.addEventListener('click', () => {
            isRunning = !isRunning;
            if (isRunning) {
                btnControl.textContent = "⏸️ Start / Pause";
                btnControl.classList.remove('paused');
                startInterval();
            } else {
                btnControl.textContent = "▶️ Resume / Mulai";
                btnControl.classList.add('paused');
                clearInterval(intervalId);
            }
        });

        btnApply.addEventListener('click', () => {
            const sec = parseInt(timerInput.value);
            if (sec && sec >= 1) {
                timerDuration = sec * 1000;
                if (isRunning) {
                    startInterval();
                }
                alert("Interval berhasil diubah menjadi " + sec + " detik!");
            } else {
                alert('Masukkan angka minimal 1 detik!');
            }
        });
    </script>
</body>
</html>
